# =============================================================================
# MHTI 自动构建与发布工作流
# =============================================================================
# 触发条件：
#   - 推送带有 v* 格式的标签 (如 v1.0.0)
#   - 手动触发 (workflow_dispatch)
#
# 功能：
#   1. 构建 Docker 多架构镜像 (Dockerfile 内部构建前端)
#   2. 推送到 Docker Hub
#   3. 导出镜像文件到 Releases
#   4. 创建 GitHub Release
# =============================================================================

name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0，不带 v 前缀)'
        required: true
        default: '1.0.0'
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false

env:
  DOCKER_IMAGE: xiyan520/mhti
  REGISTRY: docker.io

jobs:
  # ===========================================================================
  # 准备阶段：确定版本号
  # ===========================================================================
  prepare:
    name: 📋 准备版本信息
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - name: 确定版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            IS_PRERELEASE="false"
            if [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
              IS_PRERELEASE="true"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "📦 版本: $VERSION"
          echo "🏷️ 标签: v$VERSION"
          echo "🚀 预发布: $IS_PRERELEASE"

  # ===========================================================================
  # 构建并推送 Docker 镜像到 Docker Hub
  # ===========================================================================
  build-and-push:
    name: 🐳 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 QEMU (多架构支持)
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_prerelease == 'false' }}

      - name: 构建并推送 Docker 镜像
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: 输出推送结果
        run: |
          echo "## 🐳 Docker 镜像推送成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**镜像标签:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build-push.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # 导出 Docker 镜像文件 (用于离线部署)
  # ===========================================================================
  export-images:
    name: 📦 导出镜像 (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    steps:
      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 拉取镜像
        run: |
          docker pull --platform ${{ matrix.platform }} ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}
          echo "✅ 镜像拉取成功"

      - name: 导出镜像为 tar.gz
        run: |
          FILENAME="mhti-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.tar.gz"
          docker save ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }} | gzip > $FILENAME
          ls -lh $FILENAME
          echo "✅ 镜像导出成功: $FILENAME"

      - name: 上传镜像文件
        uses: actions/upload-artifact@v5
        with:
          name: docker-image-${{ matrix.arch }}
          path: mhti-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.tar.gz
          retention-days: 3
          compression-level: 0

  # ===========================================================================
  # 构建前端 ZIP 包
  # ===========================================================================
  build-frontend-zip:
    name: 🎨 打包前端
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: 安装依赖并构建
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: 打包前端
        run: |
          cd web
          zip -r ../mhti-frontend-${{ needs.prepare.outputs.version }}.zip dist/
          ls -lh ../mhti-frontend-*.zip

      - name: 上传前端包
        uses: actions/upload-artifact@v5
        with:
          name: frontend-zip
          path: mhti-frontend-${{ needs.prepare.outputs.version }}.zip
          retention-days: 3

  # ===========================================================================
  # 创建 GitHub Release
  # ===========================================================================
  create-release:
    name: 🚀 创建 Release
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, export-images, build-frontend-zip]
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 下载 Docker 镜像 (amd64)
        uses: actions/download-artifact@v5
        with:
          name: docker-image-amd64
          path: artifacts/docker-image-amd64

      - name: 下载 Docker 镜像 (arm64)
        uses: actions/download-artifact@v5
        with:
          name: docker-image-arm64
          path: artifacts/docker-image-arm64

      - name: 下载前端包
        uses: actions/download-artifact@v5
        with:
          name: frontend-zip
          path: artifacts/frontend-zip

      - name: 整理发布文件
        run: |
          mkdir -p release-files

          # 移动 Docker 镜像
          find artifacts -name "*.tar.gz" -exec mv {} release-files/ \;

          # 移动前端 ZIP
          find artifacts -name "*.zip" -exec mv {} release-files/ \;

          # 创建源码包
          git archive --format=zip --prefix=mhti-${{ needs.prepare.outputs.version }}/ \
            -o release-files/mhti-source-${{ needs.prepare.outputs.version }}.zip HEAD

          # 生成校验和
          cd release-files
          sha256sum * > SHA256SUMS.txt

          echo "📦 发布文件:"
          ls -lh

      - name: 生成更新日志
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges ${PREVIOUS_TAG}..HEAD)
          fi

          # 如果没有提交记录，显示默认信息
          if [ -z "$COMMITS" ]; then
            COMMITS="- 首次发布"
          fi

          {
            echo "changelog<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: MHTI ${{ needs.prepare.outputs.tag }}
          body: |
            ## 🎉 MHTI ${{ needs.prepare.outputs.tag }}

            **媒体文件刮削与整理工具** - 自动从 TMDB 获取元数据

            ---

            ### 🐳 Docker 部署

            #### 方式一：从 Docker Hub 拉取（推荐）

            ```bash
            # 拉取最新版本
            docker pull ${{ env.DOCKER_IMAGE }}:latest

            # 拉取指定版本
            docker pull ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}

            # 运行容器
            docker run -d \
              --name mhti \
              -p 8000:8000 \
              -v ./data:/app/data \
              -v /path/to/media:/media:ro \
              -e TZ=Asia/Shanghai \
              ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}
            ```

            #### 方式二：从 Release 加载镜像（离线部署）

            ```bash
            # AMD64 架构 (Intel/AMD 处理器)
            gunzip -c mhti-${{ needs.prepare.outputs.version }}-amd64.tar.gz | docker load

            # ARM64 架构 (Apple Silicon/树莓派)
            gunzip -c mhti-${{ needs.prepare.outputs.version }}-arm64.tar.gz | docker load

            # 然后运行
            docker run -d --name mhti -p 8000:8000 ${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}
            ```

            ---

            ### 📋 更新日志

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 📦 下载说明

            | 文件 | 说明 | 大小 |
            |------|------|------|
            | `mhti-*-amd64.tar.gz` | Docker 镜像 (x86_64) | ~200MB |
            | `mhti-*-arm64.tar.gz` | Docker 镜像 (ARM64) | ~200MB |
            | `mhti-frontend-*.zip` | 前端构建产物 | ~2MB |
            | `mhti-source-*.zip` | 源代码 | ~1MB |
            | `SHA256SUMS.txt` | 校验和 | - |

            ---

            ### 🔗 链接

            - 📖 [使用文档](https://github.com/${{ github.repository }}/blob/main/README.md)
            - 🐳 [Docker Hub](https://hub.docker.com/r/${{ env.DOCKER_IMAGE }})
            - 🐛 [问题反馈](https://github.com/${{ github.repository }}/issues)

          files: release-files/*
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布摘要
        run: |
          echo "## ✅ 发布成功!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | ${{ needs.prepare.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker 镜像 | \`${{ env.DOCKER_IMAGE }}:${{ needs.prepare.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | [查看](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.tag }}) |" >> $GITHUB_STEP_SUMMARY
